<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결혼식 식순 시간 계산기</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #fff5f5 0%, #fff0f6 50%, #f8f0ff 100%);
      min-height: 100vh;
      color: #5a3d4a;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 40px 20px 24px;
    }
    .header .en-title {
      font-size: 12px;
      color: #c9a0b0;
      letter-spacing: 4px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .header h1 {
      font-size: 24px;
      color: #8b6070;
      font-weight: 700;
    }
    .header .subtitle {
      font-size: 13px;
      color: #b89aa8;
      margin-top: 6px;
    }

    /* Card */
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(139,96,112,0.08);
      margin-bottom: 16px;
    }

    /* Input Area */
    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-group {
      display: flex;
      flex-direction: column;
    }
    .input-group.name { flex: 2; }
    .input-group.time { flex: 1; }

    .input-group label {
      font-size: 11px;
      color: #8b6070;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .input-group input {
      background: #faf5f7;
      border: 1.5px solid #e8d5dc;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      color: #5a3d4a;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .input-group input::placeholder { color: #c9b0bb; }
    .input-group input:focus { border-color: #c9a0b0; }
    .input-group input.error { border-color: #e07070; }

    .btn-add {
      background: linear-gradient(135deg, #c9a0b0, #a07890);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .btn-add:hover { opacity: 0.9; }

    /* List */
    .list-empty {
      text-align: center;
      padding: 24px 0;
      color: #c9b0bb;
      font-size: 14px;
    }
    .list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }
    .list-item:not(:last-child) {
      border-bottom: 1px solid #f5eef1;
    }
    .list-item-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .list-num {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #c9a0b0, #a07890);
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .list-name {
      font-size: 15px;
      color: #5a3d4a;
    }
    .list-item-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .list-time {
      color: #8b6070;
      font-weight: 600;
      font-size: 14px;
      white-space: nowrap;
    }
    .btn-delete {
      background: none;
      border: none;
      color: #d4a0b0;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      transition: color 0.2s;
    }
    .btn-delete:hover { color: #e07070; }

    /* Calculate Button */
    .btn-calc-wrap {
      text-align: center;
      margin: 20px 0;
    }
    .btn-calc {
      display: inline-block;
      background: linear-gradient(135deg, #b07090, #8b5070);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 48px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(139,80,112,0.3);
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-calc:hover { opacity: 0.9; }
    .btn-calc:active { transform: scale(0.98); }
    .btn-calc:disabled {
      background: #ddd;
      box-shadow: none;
      cursor: not-allowed;
    }

    /* Result */
    .result-area {
      display: none;
    }
    .result-area.show {
      display: block;
    }

    /* Capture target (list + result combined) */
    #capture-area {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(139,96,112,0.08);
      border: 2px solid #e8d5dc;
    }
    #capture-area .capture-header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f5eef1;
    }
    #capture-area .capture-header .en {
      font-size: 10px;
      color: #c9a0b0;
      letter-spacing: 3px;
    }
    #capture-area .capture-header .title {
      font-size: 18px;
      color: #8b6070;
      font-weight: 700;
      margin-top: 4px;
    }
    .capture-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
    }
    .capture-list-item:not(:last-child) {
      border-bottom: 1px solid #f5eef1;
    }
    .capture-list-item .cl-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .capture-list-item .cl-num {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #c9a0b0, #a07890);
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
    }
    .capture-list-item .cl-name {
      font-size: 14px;
      color: #5a3d4a;
    }
    .capture-list-item .cl-time {
      font-size: 14px;
      color: #8b6070;
      font-weight: 600;
    }
    .result-total {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #f5eef1;
    }
    .result-label {
      font-size: 12px;
      color: #b89aa8;
      letter-spacing: 2px;
    }
    .result-time {
      font-size: 36px;
      color: #8b5070;
      font-weight: 700;
      margin-top: 4px;
    }
    .result-time .unit {
      font-size: 18px;
      color: #b89aa8;
      margin-left: 2px;
    }
    .result-count {
      font-size: 13px;
      color: #b89aa8;
      margin-top: 4px;
    }

    /* Download Button */
    .btn-download-wrap {
      text-align: center;
      margin-top: 16px;
    }
    .btn-download {
      display: inline-block;
      background: linear-gradient(135deg, #c9a0b0, #a07890);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-download:hover { opacity: 0.9; }

    /* Responsive */
    @media (max-width: 767px) {
      .header { padding: 28px 16px 16px; }
      .header h1 { font-size: 20px; }
      .input-row {
        flex-wrap: wrap;
        gap: 10px;
      }
      .input-group.name { flex: 1 1 100%; }
      .input-group.time { flex: 1; }
      .btn-add { padding: 10px 16px; }
      .btn-calc { padding: 12px 32px; font-size: 15px; width: 100%; }
      .result-time { font-size: 30px; }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="en-title">Wedding Ceremony</div>
      <h1>결혼식 식순 시간 계산기</h1>
      <div class="subtitle">소중한 순간의 시간을 계획하세요</div>
    </div>

    <!-- Input -->
    <div class="card">
      <div class="input-row" id="inputRowDesktop">
        <div class="input-group name">
          <label for="itemName">식순 이름</label>
          <input type="text" id="itemName" placeholder="예: 신랑 입장" maxlength="30">
        </div>
        <div class="input-group time">
          <label for="itemTime">소요 시간(분)</label>
          <input type="number" id="itemTime" placeholder="5" min="1" max="999">
        </div>
        <button class="btn-add" onclick="addItem()">+ 추가</button>
      </div>
    </div>

    <!-- List -->
    <div class="card" id="listCard">
      <div id="listContainer">
        <div class="list-empty" id="emptyMsg">식순 항목을 추가해주세요</div>
      </div>
    </div>

    <!-- Calculate Button -->
    <div class="btn-calc-wrap">
      <button class="btn-calc" id="calcBtn" disabled onclick="calculate()">계산하기</button>
    </div>

    <!-- Result -->
    <div class="result-area" id="resultArea">
      <div id="capture-area">
        <div class="capture-header">
          <div class="en">WEDDING CEREMONY</div>
          <div class="title">식순 시간표</div>
        </div>
        <div id="captureList"></div>
        <div class="result-total">
          <div class="result-label">TOTAL TIME</div>
          <div class="result-time" id="totalTime"></div>
          <div class="result-count" id="totalCount"></div>
        </div>
      </div>

      <div class="btn-download-wrap" id="downloadWrap">
        <button class="btn-download" onclick="downloadImage()">이미지로 저장</button>
      </div>
    </div>
  </div>

  <script>
    const items = [];
    const nameInput = document.getElementById('itemName');
    const timeInput = document.getElementById('itemTime');
    const listContainer = document.getElementById('listContainer');
    const emptyMsg = document.getElementById('emptyMsg');
    const calcBtn = document.getElementById('calcBtn');
    const resultArea = document.getElementById('resultArea');

    // Enter key support
    nameInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') timeInput.focus();
    });
    timeInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addItem();
    });

    function addItem() {
      const name = nameInput.value.trim();
      const time = parseInt(timeInput.value);

      // Validation
      let valid = true;
      nameInput.classList.remove('error');
      timeInput.classList.remove('error');

      if (!name) {
        nameInput.classList.add('error');
        valid = false;
      }
      if (!time || time < 1) {
        timeInput.classList.add('error');
        valid = false;
      }
      if (!valid) return;

      items.push({ name, minutes: time });
      nameInput.value = '';
      timeInput.value = '';
      nameInput.focus();
      renderList();
      resultArea.classList.remove('show');
    }

    function removeItem(index) {
      items.splice(index, 1);
      renderList();
      resultArea.classList.remove('show');
    }

    function renderList() {
      // Remove existing items (keep emptyMsg)
      const existingItems = listContainer.querySelectorAll('.list-item');
      existingItems.forEach(el => el.remove());

      if (items.length === 0) {
        emptyMsg.style.display = 'block';
        calcBtn.disabled = true;
        return;
      }

      emptyMsg.style.display = 'none';
      calcBtn.disabled = false;

      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `
          <div class="list-item-left">
            <div class="list-num">${i + 1}</div>
            <span class="list-name">${escapeHtml(item.name)}</span>
          </div>
          <div class="list-item-right">
            <span class="list-time">${item.minutes}분</span>
            <button class="btn-delete" onclick="removeItem(${i})">&times;</button>
          </div>
        `;
        listContainer.appendChild(div);
      });
    }

    function calculate() {
      if (items.length === 0) return;

      const totalMinutes = items.reduce((sum, item) => sum + item.minutes, 0);

      // Build capture list
      const captureList = document.getElementById('captureList');
      captureList.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'capture-list-item';
        div.innerHTML = `
          <div class="cl-left">
            <div class="cl-num">${i + 1}</div>
            <span class="cl-name">${escapeHtml(item.name)}</span>
          </div>
          <span class="cl-time">${item.minutes}분</span>
        `;
        captureList.appendChild(div);
      });

      // Format time
      const totalTime = document.getElementById('totalTime');
      if (totalMinutes >= 60) {
        const hours = Math.floor(totalMinutes / 60);
        const mins = totalMinutes % 60;
        if (mins > 0) {
          totalTime.innerHTML = `${hours}<span class="unit">시간</span> ${mins}<span class="unit">분</span>`;
        } else {
          totalTime.innerHTML = `${hours}<span class="unit">시간</span>`;
        }
      } else {
        totalTime.innerHTML = `${totalMinutes}<span class="unit">분</span>`;
      }

      document.getElementById('totalCount').textContent = `총 ${items.length}개 식순`;
      resultArea.classList.add('show');

      // Scroll to result
      resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function downloadImage() {
      const target = document.getElementById('capture-area');
      html2canvas(target, {
        backgroundColor: '#ffffff',
        scale: 2,
        useCORS: true
      }).then(function(canvas) {
        const link = document.createElement('a');
        link.download = 'wedding-ceremony-timeline.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }).catch(function() {
        alert('이미지 저장에 실패했습니다. 다시 시도해주세요.');
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Hide download button if html2canvas failed to load
    if (typeof html2canvas === 'undefined') {
      document.getElementById('downloadWrap').style.display = 'none';
    }
  </script>
</body>
</html>
